name: .NET CI

on:
  push:
    branches: [ "main", "task01" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore practice2026.slnx

    - name: Build solution
      run: dotnet build practice2026.slnx --no-restore --configuration Release

    - name: Run tests
      run: dotnet test practice2026.slnx --no-build --verbosity normal
